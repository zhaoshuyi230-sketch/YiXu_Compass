<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
</head>
<body>
    <h1>简单测试</h1>
    <form id="testForm">
        <select id="year">
            <option value="2020">2020</option>
        </select>
        <select id="month">
            <option value="1">1</option>
        </select>
        <select id="day">
            <option value="1">1</option>
        </select>
        <button type="submit">测试</button>
    </form>
    <div id="result"></div>
    
    <script>
        console.log('页面加载');
        
        // 确保 DOM 加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 加载完成');
            
            const form = document.getElementById('testForm');
            console.log('找到表单:', form);
            
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('表单提交事件触发');
                    
                    const year = document.getElementById('year').value;
                    const month = document.getElementById('month').value;
                    const day = document.getElementById('day').value;
                    
                    console.log('日期:', year, month, day);
                    
                    const apiUrl = '/api/test';
                    console.log('API URL:', apiUrl);
                    
                    const requestData = { year, month, day };
                    console.log('请求数据:', requestData);
                    
                    // 显示结果
                    document.getElementById('result').textContent = '正在发送请求...';
                    
                    fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestData)
                    })
                    .then(response => {
                        console.log('响应状态:', response.status);
                        return response.text();
                    })
                    .then(data => {
                        console.log('响应数据:', data);
                        document.getElementById('result').textContent = '响应: ' + data;
                    })
                    .catch(error => {
                        console.error('错误:', error);
                        document.getElementById('result').textContent = '错误: ' + error.message;
                    });
                });
            }
        });
    </script>
</body>
</html>
