<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 API</title>
</head>
<body>
    <h1>测试 API 请求</h1>
    <form id="testForm">
        <select id="year">
            <option value="2020">2020</option>
        </select>
        <select id="month">
            <option value="1">1</option>
        </select>
        <select id="day">
            <option value="1">1</option>
        </select>
        <button type="submit">测试 API</button>
    </form>
    <div id="result"></div>
    
    <script>
        console.log('页面加载完成');
        
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('表单提交事件触发');
            
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            
            console.log('选择的日期:', year, month, day);
            
            const requestData = { year, month, day };
            const apiUrl = '/api/report';
            
            console.log('正在请求 API:', apiUrl);
            console.log('请求数据:', requestData);
            
            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                console.log('API 响应状态:', response.status);
                return response.text();
            })
            .then(data => {
                console.log('API 响应数据:', data);
                document.getElementById('result').textContent = data;
            })
            .catch(error => {
                console.error('错误:', error);
                document.getElementById('result').textContent = '错误: ' + error.message;
            });
        });
    </script>
</body>
</html>
