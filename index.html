<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财富天赋罗盘</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #d4af37;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 40px;
            color: #d4af37;
        }
        .date-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 20px;
        }
        .select-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #d4af37;
        }
        select {
            width: 100%;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-size: 16px;
        }
        .submit-button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a1a;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(5, 5, 15, 0.98) 0%, rgba(15, 15, 25, 0.95) 100%);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }
        .loading-overlay.active {
            display: flex;
        }
        .compass-container {
            position: relative;
            width: 280px;
            height: 280px;
            z-index: 10;
        }
        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #fff 0%, #d4af37 40%, #a67c00 100%);
            border-radius: 50%;
            animation: center-pulse 2s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(212, 175, 55, 1), 0 0 80px rgba(212, 175, 55, 0.6);
            z-index: 20;
        }
        @keyframes center-pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 40px rgba(212, 175, 55, 1), 0 0 80px rgba(212, 175, 55, 0.6);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                box-shadow: 0 0 60px rgba(212, 175, 55, 1), 0 0 100px rgba(212, 175, 55, 0.8);
            }
        }
        .compass-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            box-sizing: border-box;
        }
        .ring-1 {
            width: 280px;
            height: 280px;
            border: 1px dashed rgba(212, 175, 55, 0.6);
            animation: ring-rotate-1 8s linear infinite;
        }
        .ring-1::before {
            content: '玛雅波符';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }
        .ring-2 {
            width: 200px;
            height: 200px;
            border: 1px dashed rgba(100, 200, 200, 0.6);
            animation: ring-rotate-2 6s linear infinite reverse;
        }
        .ring-2::before {
            content: '商业基因';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: rgba(100, 200, 200, 0.5);
            letter-spacing: 2px;
        }
        .ring-3 {
            width: 120px;
            height: 120px;
            border: 1px dashed rgba(212, 175, 55, 0.4);
            animation: ring-rotate-3 4s linear infinite;
        }
        .ring-3::before {
            content: 'AI算力';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }
        @keyframes ring-rotate-1 {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes ring-rotate-2 {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes ring-rotate-3 {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        .flow-particle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #d4af37 0%, rgba(212, 175, 55, 0) 100%);
            border-radius: 50%;
            animation: particle-flow 2s ease-out forwards;
        }
        @keyframes particle-flow {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) translateX(var(--tx)) translateY(var(--ty));
                opacity: 0;
            }
        }
        .loading-text {
            margin-top: 50px;
            font-size: 1.2em;
            color: #d4af37;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            min-height: 2em;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .loading-progress {
            margin-top: 15px;
            font-size: 0.9em;
            color: #64c8c8;
            text-align: center;
            opacity: 0.8;
            z-index: 10;
        }
        .result-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 30px;
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .back-button {
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        #result h1, #result h2, #result h3 {
            color: #FACC15;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        #result h1 {
            font-size: 1.5rem;
            text-align: center;
        }
        #result h2 {
            font-size: 1.25rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.3em;
        }
        #result ul {
            list-style-type: disc;
            padding-left: 1.5em;
            margin-bottom: 1em;
        }
        #result li {
            line-height: 1.8;
            margin-bottom: 0.5em;
            color: #E5E7EB;
        }
        #result strong {
            color: #FFF;
            font-weight: 600;
        }
        #result p {
            line-height: 1.6;
            margin-bottom: 1em;
            color: #D1D5DB;
        }
        .cta-card {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(26, 26, 26, 0.9) 100%);
            border: 2px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            }
            to {
                box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            }
        }
        .cta-card h3 {
            color: #d4af37;
            font-size: 1.4em;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .cta-card p {
            color: #E5E7EB;
            line-height: 1.8;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .cta-card .highlight {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2em;
        }
        @media (max-width: 768px) {
            .cta-card {
                padding: 20px;
                margin-top: 30px;
            }
            .cta-card h3 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }
            .cta-card p {
                font-size: 1em;
                line-height: 1.6;
            }
            .cta-card .highlight {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>财富天赋罗盘</h1>
        <form action="/generate_report" method="post">
            <div class="date-selector">
                <div class="select-group">
                    <label for="year">年</label>
                    <select id="year" name="year">
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="month">月</label>
                    <select id="month" name="month">
                        <option value="">请选择</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="day">日</label>
                    <select id="day" name="day">
                        <option value="">请选择</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="submit-button" id="submitBtn">开启罗盘</button>
        </form>
    </div>
    
    <!-- Loading 动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="compass-container">
            <div class="particle-container" id="particleContainer"></div>
            <div class="compass-ring ring-1"></div>
            <div class="compass-ring ring-2"></div>
            <div class="compass-ring ring-3"></div>
            <div class="compass-center"></div>
        </div>
        <div class="loading-text" id="loadingText">正在连接 KIN 玛雅时空节点...</div>
        <div class="loading-progress">能量共振中，请保持专注</div>
    </div>
    
    <script>
        // 生成年份选项
        const yearSelect = document.getElementById('year');
        const currentYear = new Date().getFullYear();
        
        for (let i = currentYear; i >= 1950; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            yearSelect.appendChild(option);
        }
        
        // 月份变化时更新日期选项
        document.getElementById('month').addEventListener('change', function() {
            const month = parseInt(this.value);
            const daySelect = document.getElementById('day');
            
            daySelect.innerHTML = '<option value="">请选择</option>';
            
            if (!month) return;
            
            const year = parseInt(document.getElementById('year').value) || currentYear;
            const daysInMonth = new Date(year, month, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                daySelect.appendChild(option);
            }
        });
        
        // 流光粒子效果
        function createFlowParticle() {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            
            const particle = document.createElement('div');
            particle.className = 'flow-particle';
            
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 50;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');
            
            container.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 2000);
        }
        
        let particleInterval;
        function startParticles() {
            particleInterval = setInterval(createFlowParticle, 150);
        }
        
        function stopParticles() {
            if (particleInterval) {
                clearInterval(particleInterval);
            }
        }
        
        // 动态文案轮播 - 分阶段展示
        const loadingMessages = [
            '正在链接宇宙玛雅历法数据库...',
            '正在解析您的商业基因序列...',
            '为您匹配最省力的搞钱路径...'
        ];
        let messageIndex = 0;
        let messageInterval;
        
        function startTextRotation() {
            const textElement = document.getElementById('loadingText');
            messageIndex = 0;
            textElement.textContent = loadingMessages[messageIndex];
            
            // 每2秒切换一次文案（0-2秒、2-4秒、4-6秒）
            messageInterval = setInterval(() => {
                messageIndex = (messageIndex + 1) % loadingMessages.length;
                textElement.style.opacity = '0';
                setTimeout(() => {
                    textElement.textContent = loadingMessages[messageIndex];
                    textElement.style.opacity = '1';
                }, 300);
            }, 2000);
        }
        
        function stopTextRotation() {
            if (messageInterval) {
                clearInterval(messageInterval);
            }
        }
        
        // 监听表单提交
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            
            if (!year || !month || !day) {
                alert('请选择完整的日期');
                return;
            }
            
            // 显示 Loading 动画
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('submitBtn').disabled = true;
            
            // 启动粒子效果
            startParticles();
            
            // 启动文字轮播
            startTextRotation();
            
            // 创建 FormData 对象
            const formData = new FormData();
            formData.append('year', year);
            formData.append('month', month);
            formData.append('day', day);
            
            // 发送请求
            fetch('/generate_report', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应异常');
                }
                return response.text();
            })
            .then(markdown => {
                console.log('Received markdown:', markdown);
                
                // 停止粒子效果
                stopParticles();
                
                // 停止文字轮播
                stopTextRotation();
                
                // 隐藏 Loading 动画
                document.getElementById('loadingOverlay').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;
                
                // 隐藏表单容器
                document.querySelector('.container').style.display = 'none';
                
                // 创建结果容器
                const resultContainer = document.createElement('div');
                resultContainer.className = 'result-container';
                resultContainer.id = 'result';
                
                // 使用marked解析Markdown
                resultContainer.innerHTML = marked.parse(markdown);
                
                // 提取主图腾名称
                const kinMatch = markdown.match(/主图腾：([^\s]+)\s*[-–—]/);
                const kinName = kinMatch ? kinMatch[1] : '';
                const greeting = kinName ? `亲爱的${kinName}印记持有者` : '亲爱的创业者';
                
                // 添加金句展示（社交货币属性）
                const goldenQuotes = {
                    '红龙': '红龙：在废墟中重生，在黎明前觉醒',
                    '白风': '白风：用呼吸创造奇迹，用语言改变世界',
                    '蓝夜': '蓝夜：在黑暗中看见光，在寂静中听见真理',
                    '黄种子': '黄种子：不在低谷退场，只在顶峰相见',
                    '红蛇': '红蛇：用直觉穿透迷雾，用行动定义未来',
                    '白世界桥': '白世界桥：跨越生死界限，连接无限可能',
                    '蓝手': '蓝手：用双手雕刻梦想，用匠心铸就传奇',
                    '黄星星': '黄星星：在平凡中发现美，在黑暗中点亮光',
                    '红月': '红月：用情感滋养生命，用直觉指引方向',
                    '白狗': '白狗：用真心换取信任，用忠诚赢得永恒',
                    '蓝猴': '蓝猴：在游戏中寻找真理，在欢笑中释放灵魂',
                    '黄人': '黄人：用智慧点亮人生，用选择定义命运',
                    '红天行者': '红天行者：跨越时空边界，探索无限可能',
                    '巫师': '巫师：用魔法改变现实，用直觉洞察未来',
                    '蓝鹰': '蓝鹰：从高空俯瞰世界，用视野创造奇迹',
                    '黄战士': '黄战士：在挑战中成长，在战斗中觉醒',
                    '红地球': '红地球：脚踏实地前行，用行动改变世界',
                    '白镜子': '白镜子：在反射中发现真相，在镜像中看见自己',
                    '蓝风暴': '蓝风暴：在变革中寻找机遇，在风暴中创造新生',
                    '太阳': '太阳：用光芒照亮世界，用温暖治愈心灵',
                    '红龙': '红龙：在废墟中重生，在黎明前觉醒',
                    '白风': '白风：用呼吸创造奇迹，用语言改变世界',
                    '蓝夜': '蓝夜：在黑暗中看见光，在寂静中听见真理',
                    '黄种子': '黄种子：不在低谷退场，只在顶峰相见'
                };
                
                const goldenQuote = goldenQuotes[kinName] || `${kinName}：用天赋创造财富，用行动定义人生`;
                
                const quoteCard = document.createElement('div');
                quoteCard.className = 'quote-card';
                quoteCard.style.cssText = `
                    background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(10, 10, 10, 0.9) 100%);
                    border: 2px solid #D4AF37;
                    border-radius: 16px;
                    padding: 24px;
                    margin: 20px auto;
                    max-width: 600px;
                    text-align: center;
                    box-shadow: 0 8px 32px rgba(212, 175, 55, 0.3);
                    backdrop-filter: blur(10px);
                `;
                quoteCard.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 10px;">✨</div>
                    <h2 style="color: #D4AF37; font-size: 1.5em; margin: 0 0 15px 0; font-weight: bold; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);">
                        ${goldenQuote}
                    </h2>
                    <p style="color: #a67c00; font-size: 0.9em; margin: 0 0 15px 0;">
                        📸 截图分享，让更多人发现你的财富天赋
                    </p>
                    <button id="sharePosterBtn" style="
                        background: linear-gradient(135deg, #D4AF37 0%, #F4C430 100%);
                        color: #1a1a1a;
                        border: none;
                        border-radius: 8px;
                        padding: 12px 24px;
                        font-size: 1em;
                        font-weight: bold;
                        cursor: pointer;
                        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
                        transition: all 0.3s ease;
                    " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        🎨 生成分享海报
                    </button>
                `;
                resultContainer.insertBefore(quoteCard, resultContainer.firstChild);
                
                // 添加分享海报功能（在元素添加到DOM后）
                setTimeout(() => {
                    const shareBtn = document.getElementById('sharePosterBtn');
                    if (shareBtn) {
                        shareBtn.addEventListener('click', async function() {
                            try {
                                const canvas = await html2canvas(quoteCard, {
                                    backgroundColor: '#1a1a1a',
                                    scale: 2,
                                    useCORS: true,
                                    logging: false
                                });
                                
                                const link = document.createElement('a');
                                link.download = `艺序财富罗盘-${kinName}.png`;
                                link.href = canvas.toDataURL('image/png');
                                link.click();
                            } catch (error) {
                                console.error('生成海报失败:', error);
                                alert('海报生成失败，请直接截图分享');
                            }
                        });
                    }
                }, 100);
                
                // 添加VIP能量解锁卡
                const ctaCard = document.createElement('div');
                ctaCard.className = 'cta-card';
                ctaCard.style.background = 'linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(10, 10, 10, 0.95) 100%)';
                ctaCard.style.backdropFilter = 'blur(10px)';
                ctaCard.innerHTML = `
                    <div style="background: rgba(255, 50, 50, 0.1); border-left: 4px solid #ff3333; padding: 12px; margin-bottom: 20px; color: #ff3333; font-weight: bold; font-family: monospace;">
                    ⚠️ SYSTEM ALERT: 检测到 Day 8-13 包含核心变现机密，已触发安全折叠。
                </div>
                <h3>🔒 你的财富拼图仅完成 50%，请勿中途离场</h3>
