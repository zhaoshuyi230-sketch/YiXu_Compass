<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艺序·商业潜能解码器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #d4af37;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 40px;
            color: #d4af37;
        }
        .date-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 20px;
        }
        .select-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #d4af37;
        }
        select {
            width: 100%;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-size: 16px;
        }
        .submit-button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a1a;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(5, 5, 15, 0.98) 0%, rgba(15, 15, 25, 0.95) 100%);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }
        .loading-overlay.active {
            display: flex;
        }
        .progress-container {
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
            text-align: center;
        }
        .progress-bar {
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #D4AF37, #A67C00);
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .progress-text {
            margin-top: 15px;
            color: #D4AF37;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 1.5em;
        }
        .activation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(5, 5, 15, 0.98) 0%, rgba(15, 15, 25, 0.95) 100%);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .activation-overlay.active {
            display: flex;
        }
        .activation-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(10, 10, 10, 0.95) 100%);
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
        }
        .activation-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #D4AF37;
            border-radius: 10px;
            background: rgba(10, 10, 10, 0.8);
            color: #D4AF37;
            text-align: center;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin: 20px 0;
            box-sizing: border-box;
        }
        .activation-input::placeholder {
            color: #666;
            letter-spacing: 1px;
        }
        .activation-input:focus {
            outline: none;
            border-color: #F4C430;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        .activation-button {
            width: 100%;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            background: linear-gradient(135deg, #D4AF37 0%, #A67C00 100%);
            color: #1a1a1a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        .activation-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }
        .activation-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .activation-error {
            color: #ff4444;
            font-size: 0.9em;
            margin-top: 15px;
            display: none;
        }
        .activation-error.show {
            display: block;
        }
        .compass-container {
            position: relative;
            width: 280px;
            height: 280px;
            z-index: 10;
        }
        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #fff 0%, #d4af37 40%, #a67c00 100%);
            border-radius: 50%;
            animation: center-pulse 2s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(212, 175, 55, 1), 0 0 80px rgba(212, 175, 55, 0.6);
            z-index: 20;
        }
        @keyframes center-pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 40px rgba(212, 175, 55, 1), 0 0 80px rgba(212, 175, 55, 0.6);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                box-shadow: 0 0 60px rgba(212, 175, 55, 1), 0 0 100px rgba(212, 175, 55, 0.8);
            }
        }
        .compass-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            box-sizing: border-box;
        }
        .ring-1 {
            width: 280px;
            height: 280px;
            border: 1px dashed rgba(212, 175, 55, 0.6);
            animation: ring-rotate-1 8s linear infinite;
        }
        .ring-1::before {
            content: '玛雅波符';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }
        .ring-2 {
            width: 200px;
            height: 200px;
            border: 1px dashed rgba(100, 200, 200, 0.6);
            animation: ring-rotate-2 6s linear infinite reverse;
        }
        .ring-2::before {
            content: '商业基因';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: rgba(100, 200, 200, 0.5);
            letter-spacing: 2px;
        }
        .ring-3 {
            width: 120px;
            height: 120px;
            border: 1px dashed rgba(212, 175, 55, 0.4);
            animation: ring-rotate-3 4s linear infinite;
        }
        .ring-3::before {
            content: 'AI算力';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }
        @keyframes ring-rotate-1 {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes ring-rotate-2 {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes ring-rotate-3 {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        .flow-particle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #d4af37 0%, rgba(212, 175, 55, 0) 100%);
            border-radius: 50%;
            animation: particle-flow 2s ease-out forwards;
        }
        @keyframes particle-flow {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) translateX(var(--tx)) translateY(var(--ty));
                opacity: 0;
            }
        }
        .loading-text {
            margin-top: 50px;
            font-size: 1.2em;
            color: #d4af37;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            min-height: 2em;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .loading-progress {
            margin-top: 15px;
            font-size: 0.9em;
            color: #64c8c8;
            text-align: center;
            opacity: 0.8;
            z-index: 10;
        }
        .result-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 30px;
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .back-button {
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        #result h1, #result h2, #result h3 {
            color: #FACC15;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        #result h1 {
            font-size: 1.5rem;
            text-align: center;
        }
        #result h2 {
            font-size: 1.25rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.3em;
        }
        #result ul {
            list-style-type: disc;
            padding-left: 1.5em;
            margin-bottom: 1em;
        }
        #result li {
            line-height: 1.8;
            margin-bottom: 0.5em;
            color: #E5E7EB;
        }
        #result strong {
            color: #FFF;
            font-weight: 600;
        }
        #result p {
            line-height: 1.6;
            margin-bottom: 1em;
            color: #D1D5DB;
        }
        .cta-card {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(26, 26, 26, 0.9) 100%);
            border: 2px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            }
            to {
                box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            }
        }
        .cta-card h3 {
            color: #d4af37;
            font-size: 1.4em;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .cta-card p {
            color: #E5E7EB;
            line-height: 1.8;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .cta-card .highlight {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2em;
        }
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            .container {
                max-width: 100%;
                padding: 30px 20px;
            }
            h1 {
                font-size: 2em;
            }
            .compass-container {
                width: 200px;
                height: 200px;
            }
            .ring-1 {
                width: 200px;
                height: 200px;
            }
            .ring-2 {
                width: 140px;
                height: 140px;
            }
            .ring-3 {
                width: 80px;
                height: 80px;
            }
            .result-container {
                padding: 20px 15px;
            }
            .cta-card {
                padding: 20px;
                margin-top: 30px;
            }
            .cta-card h3 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }
            .cta-card p {
                font-size: 1em;
                line-height: 1.6;
            }
            .cta-card .highlight {
                font-size: 1.1em;
            }
            .quote-card {
                padding: 20px;
                max-width: 100%;
            }
            #pay-qr {
                width: 180px !important;
            }
        }
        
        /* 小屏幕手机适配 */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }
            .compass-container {
                width: 160px;
                height: 160px;
            }
            .ring-1 {
                width: 160px;
                height: 160px;
            }
            .ring-2 {
                width: 110px;
                height: 110px;
            }
            .ring-3 {
                width: 60px;
                height: 60px;
            }
            .container {
                padding: 20px 15px;
            }
            #pay-qr {
                width: 160px !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>艺序·商业潜能解码器</h1>
        <form action="/generate_report" method="post">
            <div class="date-selector">
                <div class="select-group">
                    <label for="year">年</label>
                    <select id="year" name="year">
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="month">月</label>
                    <select id="month" name="month">
                        <option value="">请选择</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="day">日</label>
                    <select id="day" name="day">
                        <option value="">请选择</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="submit-button" id="submitBtn">开启解码器</button>
        </form>
    </div>
    
    <!-- Loading 动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="compass-container">
            <div class="particle-container" id="particleContainer"></div>
            <div class="compass-ring ring-1"></div>
            <div class="compass-ring ring-2"></div>
            <div class="compass-ring ring-3"></div>
            <div class="compass-center"></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">正在连接 KIN 玛雅时空节点...</div>
        </div>
    </div>
    
    <!-- 激活码验证组件 -->
    <div class="activation-overlay" id="activationOverlay">
        <div class="activation-card">
            <div style="font-size: 48px; margin-bottom: 20px;">🔐</div>
            <h2 style="color: #D4AF37; margin-bottom: 10px; font-size: 1.8em;">解锁完整版报告</h2>
            <p style="color: #a67c00; margin-bottom: 20px; font-size: 0.95em;">
                您的专属商业潜能报告已生成<br>
                请输入激活码查看完整内容
            </p>
            <input type="text" 
                   id="activationCode" 
                   class="activation-input" 
                   placeholder="请输入激活码 (如: YX-001)"
                   maxlength="10"
                   autocomplete="off">
            <button id="activationBtn" class="activation-button">
                🚀 立即解锁
            </button>
            <div id="activationError" class="activation-error">
                ❌ 无效的印记凭证，请联系主理人获取
            </div>
            <p style="color: #666; margin-top: 20px; font-size: 0.85em;">
                💡 还没有激活码？<br>
                扫码联系主理人获取：<br>
                <span style="color: #D4AF37; font-weight: bold;">微信搜索：【艺序·AI创业实战】</span>
            </p>
        </div>
    </div>
    
    <script>
        // 全局错误处理
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('全局错误:', msg, url, lineNo, columnNo, error);
            alert('页面发生错误: ' + msg + '\n行号: ' + lineNo);
            return false;
        };
        
        window.addEventListener('unhandledrejection', function(event) {
            console.error('未处理的 Promise 错误:', event.reason);
            alert('异步错误: ' + event.reason);
        });
        
        // 等待 DOM 加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 加载完成，初始化脚本...');
            
            // 激活码列表（第一波发售验证）
            const VALID_ACTIVATION_CODES = [
                'YX-001', 'YX-002', 'YX-003', 'YX-004', 'YX-005',
                'YX-006', 'YX-007', 'YX-008', 'YX-009', 'YX-010',
                'YX-011', 'YX-012', 'YX-013', 'YX-014', 'YX-015',
                'YX-016', 'YX-017', 'YX-018', 'YX-019', 'YX-020'
            ];
            
            // 存储生成的报告内容
            let pendingReportContent = null;
            
            // 验证激活码
            function validateActivationCode(code) {
                const normalizedCode = code.toUpperCase().trim();
                return VALID_ACTIVATION_CODES.includes(normalizedCode);
            }
            
            // 显示激活码验证界面
            function showActivationOverlay(reportContent) {
                pendingReportContent = reportContent;
                document.getElementById('activationOverlay').classList.add('active');
            }
            
            // 隐藏激活码验证界面
            function hideActivationOverlay() {
                document.getElementById('activationOverlay').classList.remove('active');
                document.getElementById('activationError').classList.remove('show');
            }
            
            // 显示报告内容
            function displayReport(fullContent) {
                // 隐藏表单容器
                document.querySelector('.container').style.display = 'none';
                
                // 创建结果容器
                const resultContainer = document.createElement('div');
                resultContainer.className = 'result-container';
                resultContainer.id = 'result';
                
                // 使用marked解析Markdown
                resultContainer.innerHTML = marked.parse(fullContent);
                
                // 提取主图腾名称
                const kinMatch = fullContent.match(/主图腾：([^\s]+)\s*[-–—]/);
                const kinName = kinMatch ? kinMatch[1] : '';
                
                // 添加金句展示（社交货币属性）
                const goldenQuotes = {
                    '红龙': '红龙：在废墟中重生，在黎明前觉醒',
                    '白风': '白风：用呼吸创造奇迹，用语言改变世界',
                    '蓝夜': '蓝夜：在黑暗中看见光，在寂静中听见真理',
                    '黄种子': '黄种子：不在低谷退场，只在顶峰相见',
                    '红蛇': '红蛇：用直觉穿透迷雾，用行动定义未来',
                    '白世界桥': '白世界桥：跨越生死界限，连接无限可能',
                    '蓝手': '蓝手：用双手雕刻梦想，用匠心铸就传奇',
                    '黄星星': '黄星星：在平凡中发现美，在黑暗中点亮光',
                    '红月': '红月：用情感滋养生命，用直觉指引方向',
                    '白狗': '白狗：用真心换取信任，用忠诚赢得永恒',
                    '蓝猴': '蓝猴：在游戏中寻找真理，在欢笑中释放灵魂',
                    '黄人': '黄人：用智慧点亮人生，用选择定义命运',
                    '红天行者': '红天行者：跨越时空边界，探索无限可能',
                    '巫师': '巫师：用魔法改变现实，用直觉洞察未来',
                    '蓝鹰': '蓝鹰：从高空俯瞰世界，用视野创造奇迹',
                    '黄战士': '黄战士：在挑战中成长，在战斗中觉醒',
                    '红地球': '红地球：脚踏实地前行，用行动改变世界',
                    '白镜子': '白镜子：在反射中发现真相，在镜像中看见自己',
                    '蓝风暴': '蓝风暴：在变革中寻找机遇，在风暴中创造新生',
                    '太阳': '太阳：用光芒照亮世界，用温暖治愈心灵'
                };
                
                const goldenQuote = goldenQuotes[kinName] || `${kinName}：用天赋创造财富，用行动定义人生`;
                
                const quoteCard = document.createElement('div');
                quoteCard.className = 'quote-card';
                quoteCard.style.cssText = `
                    background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(10, 10, 10, 0.9) 100%);
                    border: 2px solid #D4AF37;
                    border-radius: 16px;
                    padding: 24px;
                    margin: 20px auto;
                    max-width: 600px;
                    text-align: center;
                    box-shadow: 0 8px 32px rgba(212, 175, 55, 0.3);
                    backdrop-filter: blur(10px);
                `;
                quoteCard.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 10px;">✨</div>
                    <h2 style="color: #D4AF37; font-size: 1.5em; margin: 0 0 15px 0; font-weight: bold; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);">
                        ${goldenQuote}
                    </h2>
                    <p style="color: #a67c00; font-size: 0.9em; margin: 0 0 15px 0;">
                        📸 截图分享，让更多人发现你的财富天赋
                    </p>
                    <button id="sharePosterBtn" style="
                        background: linear-gradient(135deg, #D4AF37 0%, #F4C430 100%);
                        color: #1a1a1a;
                        border: none;
                        border-radius: 8px;
                        padding: 12px 24px;
                        font-size: 1em;
                        font-weight: bold;
                        cursor: pointer;
                        transition: all 0.3s ease;
                    " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        📸 生成分享海报
                    </button>
                `;
                
                // 插入金句卡片
                const firstElement = resultContainer.firstChild;
                resultContainer.insertBefore(quoteCard, firstElement);
                
                // 添加到页面
                document.body.appendChild(resultContainer);
                
                // 平滑滚动到结果
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            // 激活码验证按钮事件
            const activationBtn = document.getElementById('activationBtn');
            if (activationBtn) {
                activationBtn.addEventListener('click', function() {
                    const code = document.getElementById('activationCode').value;
                    const errorDiv = document.getElementById('activationError');
                    const btn = document.getElementById('activationBtn');
                    
                    if (!code.trim()) {
                        errorDiv.textContent = '❌ 请输入激活码';
                        errorDiv.classList.add('show');
                        return;
                    }
                    
                    btn.disabled = true;
                    btn.textContent = '验证中...';
                    
                    // 模拟验证延迟
                    setTimeout(() => {
                        if (validateActivationCode(code)) {
                            // 验证成功
                            hideActivationOverlay();
                            if (pendingReportContent) {
                                displayReport(pendingReportContent);
                                pendingReportContent = null;
                            }
                        } else {
                            // 验证失败
                            errorDiv.textContent = '❌ 无效的印记凭证，请联系主理人获取';
                            errorDiv.classList.add('show');
                            btn.disabled = false;
                            btn.textContent = '🚀 立即解锁';
                            
                            // 清空输入框
                            document.getElementById('activationCode').value = '';
                        }
                    }, 500);
                });
            }
            
            // 回车键提交激活码
            const activationCode = document.getElementById('activationCode');
            if (activationCode) {
                activationCode.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        document.getElementById('activationBtn').click();
                    }
                });
            }
            
            // 生成年份选项
            const yearSelect = document.getElementById('year');
            if (yearSelect) {
                console.log('初始化年份选择器...');
                const currentYear = new Date().getFullYear();
                for (let i = currentYear; i >= 1950; i--) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i;
                    yearSelect.appendChild(option);
                }
            }
            
            // 月份变化时更新日期选项
            const monthSelect = document.getElementById('month');
            if (monthSelect) {
                monthSelect.addEventListener('change', function() {
                    const month = parseInt(this.value);
                    const daySelect = document.getElementById('day');
                    
                    daySelect.innerHTML = '<option value="">请选择</option>';
                    
                    if (!month) return;
                    
                    const year = parseInt(document.getElementById('year').value) || new Date().getFullYear();
                    const daysInMonth = new Date(year, month, 0).getDate();
                    
                    for (let i = 1; i <= daysInMonth; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = i;
                        daySelect.appendChild(option);
                    }
                });
            }
            
            // 流光粒子效果
            function createFlowParticle() {
                const container = document.getElementById('particleContainer');
                if (!container) return;
                
                const particle = document.createElement('div');
                particle.className = 'flow-particle';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                container.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 2000);
            }
            
            let particleInterval;
            function startParticles() {
                particleInterval = setInterval(createFlowParticle, 150);
            }
            
            function stopParticles() {
                if (particleInterval) {
                    clearInterval(particleInterval);
                }
            }
            
            // 动态文案轮播 - 分阶段展示
            const loadingMessages = [
                '正在链接宇宙玛雅历法数据库...',
                '正在解析您的商业基因序列...',
                '为您匹配最省力的搞钱路径...'
            ];
            let messageIndex = 0;
            let messageInterval;
            
            function startTextRotation() {
                const textElement = document.getElementById('progressText');
                if (!textElement) {
                    console.warn('未找到 progressText 元素，跳过文字轮播');
                    return;
                }
                messageIndex = 0;
                textElement.textContent = loadingMessages[messageIndex];
                
                // 每2秒切换一次文案（0-2秒、2-4秒、4-6秒）
                messageInterval = setInterval(() => {
                    const currentElement = document.getElementById('progressText');
                    if (!currentElement) {
                        console.warn('progressText 元素已不存在，停止文字轮播');
                        clearInterval(messageInterval);
                        messageInterval = null;
                        return;
                    }
                    messageIndex = (messageIndex + 1) % loadingMessages.length;
                    currentElement.style.opacity = '0';
                    setTimeout(() => {
                        const timeoutElement = document.getElementById('progressText');
                        if (timeoutElement) {
                            timeoutElement.textContent = loadingMessages[messageIndex];
                            timeoutElement.style.opacity = '1';
                        }
                    }, 300);
                }, 2000);
            }
            
            function stopTextRotation() {
                if (messageInterval) {
                    clearInterval(messageInterval);
                    messageInterval = null;
                }
            }
            
            // 监听表单提交
            const form = document.querySelector('form');
            if (form) {
                console.log('绑定表单提交事件...');
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('表单提交事件触发！');
                    
                    try {
                        const year = document.getElementById('year').value;
                        const month = document.getElementById('month').value;
                        const day = document.getElementById('day').value;
                        
                        console.log('选择的日期:', year, month, day);
                        
                        if (!year || !month || !day) {
                            alert('请选择完整的日期');
                            return;
                        }
                        
                        // 检查必要的元素是否存在
                        console.log('检查元素是否存在:');
                        console.log('loadingOverlay:', document.getElementById('loadingOverlay'));
                        console.log('submitBtn:', document.getElementById('submitBtn'));
                        console.log('activationOverlay:', document.getElementById('activationOverlay'));
                        console.log('marked:', typeof marked !== 'undefined' ? '存在' : '不存在');
                        
                        if (typeof marked === 'undefined') {
                            alert('页面加载失败，请刷新页面重试');
                            return;
                        }
                        
                        // 显示 Loading 动画
                        document.getElementById('loadingOverlay').classList.add('active');
                        document.getElementById('submitBtn').disabled = true;
                        
                        // 启动粒子效果
                        startParticles();
                        
                        // 启动文字轮播
                        startTextRotation();
                        
                        // 发送请求（使用 Edge Runtime API，支持流式传输）
                        const requestData = { year, month, day };
                        
                        // 创建 AbortController 用于超时控制
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => {
                            controller.abort();
                            console.log('请求超时，已中止');
                        }, 60000); // 60 秒超时
                        
                        // 使用相对路径，确保在任何环境下都能正确访问
                        const apiUrl = '/api/report';
                        console.log('正在请求 API:', apiUrl);
                        console.log('请求数据:', requestData);
                        
                        // 尝试 Edge Runtime API
                        fetch(apiUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(requestData),
                            signal: controller.signal
                        })
                        .then(async response => {
                            console.log('API 响应状态:', response.status);
                            if (!response.ok) {
                                const errorText = await response.text();
                                console.error('API 错误响应:', errorText);
                                throw new Error(`网络响应异常: ${response.status} - ${errorText}`);
                            }
                            
                            const reader = response.body.getReader();
                            const decoder = new TextDecoder();
                            let fullContent = '';
                            let kinName = '';
                            let kinNumber = 0;
                            
                            try {
                                while (true) {
                                    const { done, value } = await reader.read();
                                    if (done) break;
                                    
                                    const chunk = decoder.decode(value, { stream: true });
                                    const lines = chunk.split('\n').filter(line => line.trim());
                                    
                                    for (const line of lines) {
                                        try {
                                            const data = JSON.parse(line);
                                            
                                            if (data.type === 'start') {
                                                kinName = data.kin_name;
                                                kinNumber = data.kin_number;
                                                console.log('开始生成报告:', kinName, kinNumber);
                                            } else if (data.type === 'content') {
                                                fullContent += data.content;
                                                // 实时更新进度文字
                                                updateLoadingText();
                                            } else if (data.type === 'complete') {
                                                fullContent = data.content || fullContent;
                                            } else if (data.type === 'error') {
                                                console.error('API 错误:', data.message);
                                                if (data.fallback) {
                                                    fullContent = data.fallback;
                                                }
                                            }
                                        } catch (e) {
                                            console.error('解析数据失败:', e, line);
                                        }
                                    }
                                }
                                
                                // 停止粒子效果
                                stopParticles();
                                
                                // 停止文字轮播
                                stopTextRotation();
                                
                                // 隐藏 Loading 动画
                                document.getElementById('loadingOverlay').classList.remove('active');
                                document.getElementById('submitBtn').disabled = false;
                                
                                // 显示激活码验证界面
                                showActivationOverlay(fullContent);
                                
                            } catch (streamError) {
                                console.error('流式读取错误:', streamError);
                                throw streamError;
                            } finally {
                                // 清除超时定时器
                                clearTimeout(timeoutId);
                            }
                        })
                        .catch(error => {
                            // 清除超时定时器
                            clearTimeout(timeoutId);
                            
                            console.error('请求错误:', error);
                            console.error('错误名称:', error.name);
                            console.error('错误消息:', error.message);
                            console.error('错误堆栈:', error.stack);
                            
                            // 停止粒子效果
                            stopParticles();
                            
                            // 停止文字轮播
                            stopTextRotation();
                            
                            // 隐藏 Loading 动画
                            document.getElementById('loadingOverlay').classList.remove('active');
                            document.getElementById('submitBtn').disabled = false;
                            
                            // 显示详细错误提示
                            let errorMsg = '宇宙信号波动，请重新测算\n\n';
                            if (error.name === 'AbortError') {
                                errorMsg = '请求超时，请检查网络后重试';
                            } else if (error.message && error.message.includes('Failed to fetch')) {
                                errorMsg = '网络连接失败，请检查网络设置\n\n可能原因：\n1. 网络不稳定\n2. 服务器暂时不可用\n3. 需要刷新页面重试';
                            } else if (error.message) {
                                errorMsg += '错误详情: ' + error.message;
                            }
                            
                            alert(errorMsg);
                        });
                        
                        // 更新加载文字的函数
                        function updateLoadingText() {
                            const progressTexts = [
                                '正在接入玛雅 KIN 能量场...',
                                '正在解码你的商业基因序列...',
                                'AI 导师正在为你拨动财富指针...',
                                '正在匹配最佳搞钱路径...'
                            ];
                            const loadingText = document.getElementById('progressText');
                            if (loadingText) {
                                const randomIndex = Math.floor(Math.random() * progressTexts.length);
                                loadingText.textContent = progressTexts[randomIndex];
                            }
                        }
                    } catch (error) {
                        console.error('前端执行错误:', error);
                        alert('前端执行错误: ' + error.message);
                    }
                });
            } else {
                console.error('未找到表单元素！');
                alert('页面加载失败，请刷新页面重试');
            }
        });
    </script>
    <div style="text-align: center; margin-top: 50px; padding: 20px; font-size: 0.8em; color: #666;">
        <p>本系统由艺序 AI 实验室提供技术支持，基于心理学统计模型，仅供职业规划参考。</p>
    </div>
</body>
</html>
