<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财富天赋罗盘</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #d4af37;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 40px;
            color: #d4af37;
        }
        .date-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 20px;
        }
        .select-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #d4af37;
        }
        select {
            width: 100%;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-size: 16px;
        }
        .submit-button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a1a;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(5, 5, 15, 0.98) 0%, rgba(15, 15, 25, 0.95) 100%);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }
        .loading-overlay.active {
            display: flex;
        }
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.8) 0%, rgba(100, 200, 200, 0.4) 100%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0.8;
            }
        }
        .compass-animation {
            position: relative;
            width: 250px;
            height: 250px;
            z-index: 10;
        }
        .compass-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .compass-ring-1 {
            width: 250px;
            height: 250px;
            border: 3px solid transparent;
            border-top-color: #d4af37;
            border-right-color: #64c8c8;
            animation: rotate 4s linear infinite;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(100, 200, 200, 0.1);
        }
        .compass-ring-2 {
            width: 200px;
            height: 200px;
            border: 4px solid transparent;
            border-top-color: #64c8c8;
            border-right-color: #d4af37;
            border-bottom-color: #64c8c8;
            animation: rotate 3s linear infinite reverse;
            box-shadow: 0 0 25px rgba(100, 200, 200, 0.5), inset 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .compass-ring-3 {
            width: 150px;
            height: 150px;
            border: 2px solid transparent;
            border-top-color: #d4af37;
            border-right-color: #d4af37;
            border-bottom-color: #64c8c8;
            animation: rotate 2.5s linear infinite;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }
        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #d4af37 0%, #64c8c8 50%, #a67c00 100%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(212, 175, 55, 1), 0 0 60px rgba(100, 200, 200, 0.6);
        }
        .compass-center::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #fff 0%, #d4af37 100%);
            border-radius: 50%;
            animation: inner-pulse 1s ease-in-out infinite;
        }
        @keyframes inner-pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
        }
        .compass-needle-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            animation: rotate 10s linear infinite;
        }
        .compass-needle {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 60px;
            background: linear-gradient(to bottom, #d4af37 0%, #64c8c8 100%);
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }
        .compass-needle::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid #d4af37;
        }
        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 40px rgba(212, 175, 55, 1), 0 0 60px rgba(100, 200, 200, 0.6);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.15);
                box-shadow: 0 0 60px rgba(212, 175, 55, 1), 0 0 80px rgba(100, 200, 200, 0.8);
            }
        }
        .loading-text {
            margin-top: 50px;
            font-size: 1.4em;
            color: #d4af37;
            font-weight: bold;
            text-align: center;
            animation: text-breathe 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.8), 0 0 50px rgba(100, 200, 200, 0.4);
            min-height: 1.5em;
            z-index: 10;
        }
        @keyframes text-breathe {
            0%, 100% {
                opacity: 0.7;
                transform: scale(0.98);
            }
            50% {
                opacity: 1;
                transform: scale(1.02);
            }
        }
        .loading-subtext {
            margin-top: 15px;
            font-size: 0.95em;
            color: #64c8c8;
            text-align: center;
            opacity: 0.9;
            z-index: 10;
            text-shadow: 0 0 15px rgba(100, 200, 200, 0.6);
        }
        .result-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 30px;
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .back-button {
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        #result h1, #result h2, #result h3 {
            color: #FACC15;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        #result h1 {
            font-size: 1.5rem;
            text-align: center;
        }
        #result h2 {
            font-size: 1.25rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.3em;
        }
        #result ul {
            list-style-type: disc;
            padding-left: 1.5em;
            margin-bottom: 1em;
        }
        #result li {
            line-height: 1.8;
            margin-bottom: 0.5em;
            color: #E5E7EB;
        }
        #result strong {
            color: #FFF;
            font-weight: 600;
        }
        #result p {
            line-height: 1.6;
            margin-bottom: 1em;
            color: #D1D5DB;
        }
        .cta-card {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(26, 26, 26, 0.9) 100%);
            border: 2px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            }
            to {
                box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            }
        }
        .cta-card h3 {
            color: #d4af37;
            font-size: 1.4em;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .cta-card p {
            color: #E5E7EB;
            line-height: 1.8;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .cta-card .highlight {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2em;
        }
        @media (max-width: 768px) {
            .cta-card {
                padding: 20px;
                margin-top: 30px;
            }
            .cta-card h3 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }
            .cta-card p {
                font-size: 1em;
                line-height: 1.6;
            }
            .cta-card .highlight {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>财富天赋罗盘</h1>
        <form action="/generate_report" method="post">
            <div class="date-selector">
                <div class="select-group">
                    <label for="year">年</label>
                    <select id="year" name="year">
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="month">月</label>
                    <select id="month" name="month">
                        <option value="">请选择</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="day">日</label>
                    <select id="day" name="day">
                        <option value="">请选择</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="submit-button" id="submitBtn">开启罗盘</button>
        </form>
    </div>
    
    <!-- Loading 动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="particles-container" id="particlesContainer"></div>
        <div class="compass-animation">
            <div class="compass-ring compass-ring-1"></div>
            <div class="compass-ring compass-ring-2"></div>
            <div class="compass-ring compass-ring-3"></div>
            <div class="compass-center"></div>
            <div class="compass-needle-container">
                <div class="compass-needle"></div>
            </div>
        </div>
        <div class="loading-text" id="loadingText">正在接入玛雅 KIN 能量场...</div>
        <div class="loading-subtext">宇宙能量正在汇聚，请保持专注</div>
    </div>
    
    <script>
        // 生成年份选项
        const yearSelect = document.getElementById('year');
        const currentYear = new Date().getFullYear();
        
        for (let i = currentYear; i >= 1950; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            yearSelect.appendChild(option);
        }
        
        // 月份变化时更新日期选项
        document.getElementById('month').addEventListener('change', function() {
            const month = parseInt(this.value);
            const daySelect = document.getElementById('day');
            
            daySelect.innerHTML = '<option value="">请选择</option>';
            
            if (!month) return;
            
            const year = parseInt(document.getElementById('year').value) || currentYear;
            const daysInMonth = new Date(year, month, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                daySelect.appendChild(option);
            }
        });
        
        // 创建粒子效果
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                
                container.appendChild(particle);
            }
        }
        
        // 动态文字切换
        const loadingMessages = [
            '正在接入玛雅 KIN 能量场...',
            '正在解码你的商业基因序列...',
            'AI 导师正在为你拨动财富指针...',
            '正在匹配最佳搞钱路径...',
            '宇宙能量正在为你加持...',
            '正在生成你的专属财富蓝图...'
        ];
        let messageIndex = 0;
        let messageInterval;
        
        function startTextRotation() {
            const textElement = document.getElementById('loadingText');
            messageIndex = 0;
            textElement.textContent = loadingMessages[messageIndex];
            
            messageInterval = setInterval(() => {
                messageIndex = (messageIndex + 1) % loadingMessages.length;
                textElement.style.opacity = '0';
                setTimeout(() => {
                    textElement.textContent = loadingMessages[messageIndex];
                    textElement.style.opacity = '1';
                }, 300);
            }, 3000);
        }
        
        function stopTextRotation() {
            if (messageInterval) {
                clearInterval(messageInterval);
            }
        }
        
        // 监听表单提交
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            
            if (!year || !month || !day) {
                alert('请选择完整的日期');
                return;
            }
            
            // 显示 Loading 动画
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('submitBtn').disabled = true;
            
            // 创建粒子效果
            createParticles();
            
            // 开始文字轮播
            startTextRotation();
            
            // 创建 FormData 对象
            const formData = new FormData();
            formData.append('year', year);
            formData.append('month', month);
            formData.append('day', day);
            
            // 发送请求
            fetch('/generate_report', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应异常');
                }
                return response.text();
            })
            .then(markdown => {
                console.log('Received markdown:', markdown);
                
                // 停止文字轮播
                stopTextRotation();
                
                // 隐藏 Loading 动画
                document.getElementById('loadingOverlay').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;
                
                // 隐藏表单容器
                document.querySelector('.container').style.display = 'none';
                
                // 创建结果容器
                const resultContainer = document.createElement('div');
                resultContainer.className = 'result-container';
                resultContainer.id = 'result';
                
                // 使用marked解析Markdown
                resultContainer.innerHTML = marked.parse(markdown);
                
                // 添加引流转化卡片
                const ctaCard = document.createElement('div');
                ctaCard.className = 'cta-card';
                ctaCard.innerHTML = `
                    <h3>🎁 想知道如何把这份天赋变成真实现金流？</h3>
                    <p>截图保存你的罗盘，添加主理人微信/小红书：<span class="highlight">【艺序·AI创业实战】</span></p>
                    <p>发送截图，为你进行 1v1 深度商业拆解，获取你的专属落地指南！</p>
                `;
                resultContainer.appendChild(ctaCard);
                
                // 添加返回按钮
                const backButton = document.createElement('button');
                backButton.className = 'back-button';
                backButton.textContent = '重新测算';
                backButton.onclick = () => location.reload();
                resultContainer.appendChild(backButton);
                
                // 添加到页面
                document.body.appendChild(resultContainer);
            })
            .catch(error => {
                // 停止文字轮播
                stopTextRotation();
                
                // 隐藏 Loading 动画
                document.getElementById('loadingOverlay').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;
                
                console.error('Error:', error);
                alert('生成报告失败，请重试');
            });
        });
    </script>
</body>
</html>
