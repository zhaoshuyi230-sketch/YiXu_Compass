<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财富天赋罗盘</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #d4af37;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 40px;
            color: #d4af37;
        }
        .date-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 20px;
        }
        .select-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #d4af37;
        }
        select {
            width: 100%;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-size: 16px;
        }
        .submit-button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a1a;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 26, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-text {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #d4af37;
        }
        .result-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 30px;
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .back-button {
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        #result h1, #result h2, #result h3 {
            color: #FACC15;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        #result h1 {
            font-size: 1.5rem;
            text-align: center;
        }
        #result h2 {
            font-size: 1.25rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.3em;
        }
        #result ul {
            list-style-type: disc;
            padding-left: 1.5em;
            margin-bottom: 1em;
        }
        #result li {
            line-height: 1.8;
            margin-bottom: 0.5em;
            color: #E5E7EB;
        }
        #result strong {
            color: #FFF;
            font-weight: 600;
        }
        #result p {
            line-height: 1.6;
            margin-bottom: 1em;
            color: #D1D5DB;
        }
        .cta-card {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(26, 26, 26, 0.9) 100%);
            border: 2px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            }
            to {
                box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            }
        }
        .cta-card h3 {
            color: #d4af37;
            font-size: 1.4em;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .cta-card p {
            color: #E5E7EB;
            line-height: 1.8;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .cta-card .highlight {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2em;
        }
        @media (max-width: 768px) {
            .cta-card {
                padding: 20px;
                margin-top: 30px;
            }
            .cta-card h3 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }
            .cta-card p {
                font-size: 1em;
                line-height: 1.6;
            }
            .cta-card .highlight {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>财富天赋罗盘</h1>
        <form action="/generate_report" method="post">
            <div class="date-selector">
                <div class="select-group">
                    <label for="year">年</label>
                    <select id="year" name="year">
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="month">月</label>
                    <select id="month" name="month">
                        <option value="">请选择</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="day">日</label>
                    <select id="day" name="day">
                        <option value="">请选择</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="submit-button" id="submitBtn">开启罗盘</button>
        </form>
    </div>
    
    <!-- Loading 动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">罗盘高速推演中...</div>
    </div>
    
    <script>
        // 生成年份选项
        const yearSelect = document.getElementById('year');
        const currentYear = new Date().getFullYear();
        
        for (let i = currentYear; i >= 1950; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            yearSelect.appendChild(option);
        }
        
        // 月份变化时更新日期选项
        document.getElementById('month').addEventListener('change', function() {
            const month = parseInt(this.value);
            const daySelect = document.getElementById('day');
            
            // 清空现有选项
            daySelect.innerHTML = '<option value="">请选择</option>';
            
            if (!month) return;
            
            // 计算当月天数
            const year = parseInt(document.getElementById('year').value) || currentYear;
            const daysInMonth = new Date(year, month, 0).getDate();
            
            // 添加日期选项
            for (let i = 1; i <= daysInMonth; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                daySelect.appendChild(option);
            }
        });
        
        // 监听表单提交
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 检查表单是否完整
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            
            if (!year || !month || !day) {
                alert('请选择完整的日期');
                return;
            }
            
            // 显示 Loading 动画
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '罗盘高速推演中...';
            
            // 创建 FormData 对象
            const formData = new FormData();
            formData.append('year', year);
            formData.append('month', month);
            formData.append('day', day);
            
            // 发送请求
            fetch('/generate_report', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应异常');
                }
                return response.text();
            })
            .then(markdown => {
                console.log('Received markdown:', markdown);
                
                // 隐藏 Loading 动画
                document.getElementById('loadingOverlay').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '开启罗盘';
                
                // 隐藏表单容器
                document.querySelector('.container').style.display = 'none';
                
                // 创建结果容器
                const resultContainer = document.createElement('div');
                resultContainer.className = 'result-container';
                resultContainer.id = 'result';
                
                // 使用marked解析Markdown
                resultContainer.innerHTML = marked.parse(markdown);
                
                // 添加引流转化卡片
                const ctaCard = document.createElement('div');
                ctaCard.className = 'cta-card';
                ctaCard.innerHTML = `
                    <h3>🎁 想知道如何把这份天赋变成真实现金流？</h3>
                    <p>截图保存你的罗盘，添加主理人微信/小红书：<span class="highlight">【艺序·AI避坑实战】</span></p>
                    <p>发送截图，为你进行 1v1 深度商业拆解，获取你的专属落地指南！</p>
                `;
                resultContainer.appendChild(ctaCard);
                
                // 添加返回按钮
                const backButton = document.createElement('button');
                backButton.className = 'back-button';
                backButton.textContent = '重新测算';
                backButton.onclick = () => location.reload();
                resultContainer.appendChild(backButton);
                
                // 添加到页面
                document.body.appendChild(resultContainer);
            })
            .catch(error => {
                // 隐藏 Loading 动画
                document.getElementById('loadingOverlay').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '开启罗盘';
                
                console.error('Error:', error);
                alert('生成报告失败，请重试');
            });
        });
    </script>
</body>
</html>
